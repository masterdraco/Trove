services:
  backend:
    image: python:3.12-slim
    container_name: trove-backend-dev
    working_dir: /app/backend
    command: >
      bash -lc "pip install --no-cache-dir uv &&
                uv pip install --system -e . &&
                uv pip install --system pytest pytest-asyncio respx &&
                uv run alembic upgrade head &&
                uv run uvicorn trove.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app/backend
      - ./config:/config
      - ./data:/data
    environment:
      - TROVE_CONFIG_DIR=/config
      - TROVE_DATA_DIR=/data
      - TROVE_AI_ENDPOINT=http://host.docker.internal:11434
      - TROVE_AI_MODEL=ollama/gemma4:latest
      - TROVE_SESSION_SECRET=dev-secret
      - TROVE_CORS_ORIGINS=["http://localhost:5173"]
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    container_name: trove-web-dev
    working_dir: /web
    command: sh -lc "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    volumes:
      - ./web:/web
    ports:
      - "5173:5173"
    depends_on:
      - backend
